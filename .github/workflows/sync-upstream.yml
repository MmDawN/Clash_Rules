name: Sync Upstream and Update Custom Branch

on:
  schedule:
    - cron: '30 0,6,12,18 * * *' # Every 6 hours offset
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync logic
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

          # Add upstream
          git remote add upstream https://github.com/Aethersailor/Custom_OpenClash_Rules.git
          git fetch upstream main

          # 1. Update main branch to match upstream/main EXACTLY
          # Use -B and explicit upstream/main to avoid 'multiple remote tracking branches' error
          git checkout -B main upstream/main
          git push origin main --force

          # 2. Update zq_custom branch by merging the new main
          git checkout zq_custom
          git merge main --no-edit || echo "Conflicts occurred, manual merging may be required."
          git push origin zq_custom
